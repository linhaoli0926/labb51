<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>二次方程求解器 - lab51</title>
</head>
<body>
    <h2>一元二次方程 ax² + bx + c = 0</h2>
    <button id="solveBtn">开始求解</button>
    <p>结果会显示在弹窗和控制台(F12)中</p >

    <script>
        const solveBtn = document.getElementById('solveBtn');
        solveBtn.addEventListener('click', () => {
            // 1. 三次prompt获取系数
            let a = parseFloat(prompt("请输入系数 a (a > 0)"));
            if (a === null || isNaN(a)) return alert("a无效");
            let b = parseFloat(prompt("请输入系数 b"));
            if (b === null || isNaN(b)) return alert("b无效");
            let c = parseFloat(prompt("请输入系数 c"));
            if (c === null || isNaN(c)) return alert("c无效");

            // 2. 计算判别式 (假设a>0且Δ>=0)
            let delta = b * b - 4 * a * c;
            let x1 = (-b + Math.sqrt(delta)) / (2 * a);
            let x2 = (-b - Math.sqrt(delta)) / (2 * a);

            // 3. alert显示结果
            alert(`方程 ${a}x² + ${b}x + ${c} = 0\nx₁ = ${x1}\nx₂ = ${x2}`);

            // 4. console.log输出
            console.log(`方程: ${a}x² + ${b}x + ${c} = 0`);
            console.log(`判别式 Δ = ${delta}`);
            console.log(`x₁ = ${x1}, x₂ = ${x2}`);
        });
    </script>
</body>
</html>
